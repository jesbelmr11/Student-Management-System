<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f9ff; /* main background */
            color: #1e3c72;      /* secondary color for text */
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: #1e3c72; /* secondary color for sidebar */
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            position: fixed;
            top: 0;
            bottom: 0;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #2a5298;
            transform: translateX(5px);
        }

        .sidebar a.active {
            background: #2a5298;
        }

        /* Main content */
        .main-content {
            margin-left: 240px;
            padding: 20px;
            flex: 1;
        }

        h1 {
            margin-top: 40px;
        }

        p {
            margin-top: 10px;
        }

        /* Responsive for small screens */
        @media (max-width: 500px) {
            .sidebar {
                width: 100%;
                position: relative;
            }
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Teacher Panel</h2>
    <a href="/teacher/dashboard" class="active">🏠 Dashboard</a>
    <a href="/teacher/marks">📊 Manage Marks</a>
    <a href="/teacher/attendance">🙋🏻‍♂️ Attendance</a>
    <a href="/teacher/subjects">📘 Subjects</a>
    
    <a href="/">🚪 Logout</a>
</div>

<div class="main-content">
    <h1>Welcome, <span th:text="${session.loggedTeacher.name}"></span>!</h1>
    <p>You are logged in as <span th:text="${session.loggedTeacher.email}"></span></p>
</div>

</body>
</html>
