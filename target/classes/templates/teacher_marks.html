<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Student Marks</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f9ff;
            color: #1e3c72;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: #1e3c72;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            position: fixed;
            top: 0;
            bottom: 0;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #2a5298;
            transform: translateX(5px);
        }

        .sidebar a.active {
            background: #2a5298;
        }

        /* Main content */
        .main-content {
            margin-left: 240px;
            padding: 20px;
            flex: 1;
        }

        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .form-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .form-container input {
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0;
            border: 1px solid #1e3c72;
            border-radius: 6px;
            outline: none;
        }

        .form-container input:focus {
            border-color: #2a5298;
            box-shadow: 0 0 5px #2a5298;
        }

        .form-container button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .form-container button:hover {
            background: #2a5298;
            transform: scale(1.05);
        }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        table th {
            background: #1e3c72;
            color: white;
        }

        table tr:nth-child(even) {
            background: #f2f2f2;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .sidebar {
                width: 100%;
                position: relative;
            }
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>Teacher Panel</h2>
    <a href="/teacher/dashboard">🏠 Dashboard</a>
    <a href="/teacher/marks" class="active">📊 Marks</a>
    <a href="/teacher/attendance">🙋🏻‍♂️ Attendance</a>
    <a href="/teacher/subjects">📘 Subjects</a>
    
    <a href="/">🚪 Logout</a>
</div>

<div class="main-content">
    <div class="header">
        <h2>Update Student Marks</h2>
        <p>Enter student ID (primary key), subject, and marks</p>
    </div>

    <!-- ====== Marks Entry Form ====== -->
    <div class="form-container">
        <form action="/teacher/marks" method="post">
            <label>Student ID:</label>
            <input type="number" name="Id" placeholder="Enter Student ID" required /><br/>

            <label>Subject:</label>
            <input type="text" name="subject" placeholder="Math" required /><br/>

            <label>Marks:</label>
            <input type="number" name="mark" min="0" max="100" required /><br/>

            <button type="submit">Save Marks</button>
        </form>

        <div th:if="${success}" style="color:green; margin-top:10px;">
            <p th:text="${success}"></p>
        </div>
        <div th:if="${error}" style="color:red; margin-top:10px;">
            <p th:text="${error}"></p>
        </div>
    </div>

    <!-- ====== Existing Marks Table ====== -->
    <div class="table-container">
        <h3>Existing Marks</h3>
        <table>
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Subject</th>
                    <th>Marks</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${marksList}">
                    <td th:text="${m.studentId}"></td>
                    <td th:text="${m.name != null ? m.name : 'N/A'}"></td>
                    <td th:text="${m.subject}"></td>
                    <td th:text="${m.mark}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
