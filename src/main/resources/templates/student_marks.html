<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Marks</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f9ff; /* main background */
            color: #1e3c72;      /* secondary color for text */
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: #1e3c72; /* secondary color for sidebar */
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            position: fixed;
            top: 0;
            bottom: 0;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 15px 20px;
            display: block;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #2a5298;
            transform: translateX(5px);
        }

        .sidebar a.active {
            background: #2a5298;
        }

        /* Main content */
        .main-content {
            margin-left: 240px;
            padding: 20px;
            flex: 1;
        }

        .header {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .table-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        table th {
            background: #1e3c72; /* secondary color for table header */
            color: white;         /* main color for text */
        }

        table tr:nth-child(even) {
            background: #f2f2f2;
        }

        button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2a5298;
            transform: translateY(-2px);
        }

        /* Responsive for small screens */
        @media (max-width: 500px) {
            .sidebar {
                width: 100%;
                position: relative;
            }
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Student Panel</h2>
        <a href="/student/dashboard">🏠 Dashboard</a>
        <a href="/student/attendance">📅 Attendance</a>
        <a href="/student/marks" class="active">📊 Marks</a>
        <a href="/student/subjects">📘 Subjects</a>
        <a href="/">🚪 Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>Your Marks</h2>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Marks</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="mark : ${marksList}">
                        <td th:text="${mark.subject}">Subject Name</td>
                        <td th:text="${mark.mark}">0</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(marksList)}">
                        <td colspan="2">No marks available</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
